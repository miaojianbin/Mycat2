name: Build Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

concurrency:
  group: build-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build package
        run: mvn -B -ntp package -Dmaven.test.skip=true -pl !assistant

      - name: Show package
        run: ls -lh mycat2/target/*-jar-with-dependencies.jar

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: mycat2-package
          path: mycat2/target/*-jar-with-dependencies.jar
          if-no-files-found: error
          retention-days: 14
